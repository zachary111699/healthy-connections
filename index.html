.rg{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:6px;margin-bottom:10px}
.rc{background:#060a1430;border:1px solid #00f7ff08;border-radius:8px;padding:12px;text-align:center}
.rc-n{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:800}
.rc-l{font-size:7px;color:#c8f0ff30;text-transform:uppercase;letter-spacing:0.5px;margin-top:4px}

/* Comparison cards */
.rpt-cmp{display:grid;grid-template-columns:1fr 40px 1fr;gap:4px;align-items:center;margin-bottom:4px;background:#060a1430;border-radius:8px;padding:8px}
.rpt-cmp-box{text-align:center}
.rpt-cmp-val{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:800}
.rpt-cmp-lbl{font-size:7px;color:#c8f0ff30;text-transform:uppercase}
.rpt-cmp-arrow{text-align:center}
.rpt-change{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700}
.rpt-up{color:#6ee7b7}.rpt-down{color:#ff4757}.rpt-flat{color:#c8f0ff30}

/* Action buttons row */
.rpt-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}
.rpt-act{padding:10px 16px;border-radius:10px;border:1px solid #00f7ff15;background:#0a1628;color:#c8f0ff;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.5px;display:flex;align-items:center;gap:6px}
.rpt-act:hover{background:#00f7ff08;border-color:#00f7ff25}
.rpt-act-primary{background:linear-gradient(135deg,#00f7ff15,#00f7ff08);border-color:#00f7ff30;color:#00f7ff}

@media(max-width:768px){
.dz-grid{grid-template-columns:1fr !important}
.rpt-grid{grid-template-columns:1fr 1fr !important}
.rg{grid-template-columns:1fr 1fr !important}
.rpt-cmp{grid-template-columns:1fr !important;text-align:center}
.rpt-cmp-arrow{transform:rotate(90deg)}
.rpt-actions{flex-direction:column}
.rpt-act{justify-content:center;width:100%}
.rpt-stat-num{font-size:20px !important}
}

function getPickupDatesForMonth(pu,yearMonth){
var dates=[];
if(!pu.date&&!pu.day)return dates;
var base;
if(pu.date){base=new Date(pu.date+"T12:00:00")}
else{base=new Date();var days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];var target=days.indexOf(pu.day);if(target===-1)return dates;base.setDate(base.getDate()-((base.getDay()-target+7)%7));base.setDate(base.getDate()-28)}
if(!pu.recurring||pu.recurrence==="once"){if(pu.date&&pu.date.substring(0,7)===yearMonth)dates.push(pu.date);return dates}
var d=new Date(base);var endMonth=new Date(yearMonth+"-28T12:00:00");endMonth.setMonth(endMonth.getMonth()+1);endMonth.setDate(5);
var startMonth=new Date(yearMonth+"-01T12:00:00");
var safety=0;
while(d<startMonth&&safety<200){if(pu.recurrence==="weekly")d.setDate(d.getDate()+7);else if(pu.recurrence==="biweekly")d.setDate(d.getDate()+14);else if(pu.recurrence==="monthly")d.setMonth(d.getMonth()+1);else break;safety++}
safety=0;
while(d<=endMonth&&safety<10){var ds3=d.toISOString().split("T")[0];if(ds3.substring(0,7)===yearMonth)dates.push(ds3);if(pu.recurrence==="weekly")d.setDate(d.getDate()+7);else if(pu.recurrence==="biweekly")d.setDate(d.getDate()+14);else if(pu.recurrence==="monthly")d.setMonth(d.getMonth()+1);else break;safety++}
return dates}

function genBarcodeSVG(text,w,h2){
if(!text)return"";
var C128B=[212222,222122,222221,121223,121322,131222,122213,122312,132212,221213,221312,231212,112232,122132,122231,113222,123122,123221,223211,221132,221231,213212,223112,312131,311222,321122,321221,312212,322112,322211,212123,212321,232121,111323,131123,131321,112313,132113,132311,211313,231113,231311,112133,112331,132131,113123,113321,133121,313121,211331,231131,213113,213311,213131,311123,311321,331121,312113,312311,332111,314111,221411,431111,111224,111422,121124,121421,141122,141221,112214,112412,122114,122411,142112,142211,241211,221114,413111,241112,134111,111242,121142,121241,114212,124112,124211,411212,421112,421211,212141,214121,412121,111143,111341,131141,114113,114311,411113,411311,113141,114131,311141,411131,211412,211214,211232,2331112];
var START_B=104;var STOP=106;
var codes=[START_B];var checksum=START_B;
for(var i=0;i<text.length;i++){var c=text.charCodeAt(i)-32;if(c<0||c>95)c=0;codes.push(c);checksum+=c*(i+1)}
codes.push(checksum%103);codes.push(STOP);
var bars="";codes.forEach(function(c){var p=C128B[c].toString();for(var j=0;j<p.length;j++){bars+=(j%2===0?"1":"0").repeat(parseInt(p[j]))}});
bars+="11";
var bw=w/bars.length;
var svg="<svg viewBox='0 0 "+w+" "+(h2+20)+"' width='"+w+"' style='display:block;margin:0 auto'>";
svg+="<rect width='"+w+"' height='"+(h2+20)+"' fill='white' rx='4'/>";
for(var k=0;k<bars.length;k++){if(bars[k]==="1")svg+="<rect x='"+(k*bw)+"' y='4' width='"+bw+"' height='"+h2+"' fill='black'/>"}
svg+="<text x='"+(w/2)+"' y='"+(h2+16)+"' text-anchor='middle' font-family='monospace' font-size='12' fill='black'>"+text+"</text>";
svg+="</svg>";return svg}

nutrLogs.slice(0,10).forEach(function(n){h2+="<div style='padding:4px 0;border-bottom:1px solid #00f7ff04;font-size:10px'><span style='color:#c8f0ff30'>"+H(n.date)+"</span> "+H(n.meal)+": "+H(n.text)+"</div>"});
}else{h2+="<div style='font-size:10px;color:#c8f0ff20'>No nutrition logs</div>"}

/* ── REFERRALS ── */
h2+="<div style='font-family:Orbitron;font-size:10px;color:#c792ff;margin:8px 0 4px;letter-spacing:1px'>REFERRALS</div>";
var hasRef=false;
if(p.referrals){
[["mh","Mental Health","#c792ff"],["nutr","Nutrition","#6ee7b7"],["fin","Financial","#f59e0b"],["career","Career","#00f7ff"]].forEach(function(s){
var ref=p.referrals[s[0]];if(!ref||!ref.consent)return;hasRef=true;
h2+="<div style='display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #00f7ff04;font-size:10px'><span style='color:"+s[2]+"'>"+s[1]+"</span><span style='color:#c8f0ff30'>"+H(ref.status||"Referred")+" · "+H(ref.date||"")+"</span></div>"})}
if(!hasRef)h2+="<div style='font-size:10px;color:#c8f0ff20'>No referrals</div>";

/* ── JOURNAL ── */
h2+="<div style='font-family:Orbitron;font-size:10px;color:#00f7ff;margin:8px 0 4px;letter-spacing:1px'>JOURNAL ENTRIES</div>";
var journals=(JOURNALS[p.id]||[]).slice().reverse();
if(journals.length){
journals.slice(0,10).forEach(function(j){h2+="<div style='padding:4px 0;border-bottom:1px solid #00f7ff04;font-size:10px'><span style='color:#c8f0ff30'>"+H(j.date)+"</span> "+H(j.text).substring(0,80)+(j.text.length>80?"...":"")+"</div>"});
}else{h2+="<div style='font-size:10px;color:#c8f0ff20'>No journal entries</div>"}

/* ── NOTES ── */
h2+="<div style='font-family:Orbitron;font-size:10px;color:#f59e0b;margin:8px 0 4px;letter-spacing:1px'>COACH NOTES</div>";
if(p.notes&&p.notes.length){
(p.notes||[]).slice().reverse().forEach(function(n){h2+="<div style='padding:4px 0;border-bottom:1px solid #00f7ff04;font-size:10px'><span style='color:#c8f0ff30'>"+H(n.date)+"</span> "+H(n.text)+"</div>"});
}else{h2+="<div style='font-size:10px;color:#c8f0ff20'>No notes</div>"}

/* ── RESOURCES ASSIGNED ── */
h2+="<div style='font-family:Orbitron;font-size:10px;color:#6ee7b7;margin:8px 0 4px;letter-spacing:1px'>ASSIGNED RESOURCES</div>";
if(p.assignedRes&&p.assignedRes.length){
(p.assignedRes||[]).forEach(function(r){h2+="<div style='font-size:10px;padding:2px 0'>• "+H(r)+"</div>"});
}else{h2+="<div style='font-size:10px;color:#c8f0ff20'>None assigned</div>"}

h2+="</div>";
SM(h2)}


function openRecipeManager(){
var h2="<div class='mti'>🥗 RECIPE LIBRARY "+XB()+"</div>";
h2+="<div style='margin-bottom:8px'><input class='si' id='recSrch' placeholder='Search recipes...' oninput='filterRecipes()' style='width:100%'></div>";
h2+="<div id='recipeList'>";
RECIPES.forEach(function(r,ri){
h2+="<div class='recipe-card' data-idx='"+ri+"' onclick='viewRecipeAdmin("+ri+")'>";
h2+="<div class='recipe-name'>"+H(r.name)+"</div>";
h2+="<div class='recipe-meta'><span>"+H(r.cat)+"</span><span>"+H(r.time)+"</span><span>$"+H(r.cost)+"</span></div></div>"});
h2+="</div>";
h2+="<button class='b bg2' style='width:100%;margin-top:8px;padding:10px' onclick='openAddRecipe()'>+ ADD CUSTOM RECIPE</button>";
SM(h2)}

function filterRecipes(){
var q=document.getElementById("recSrch").value.toLowerCase();
var cards=document.querySelectorAll(".recipe-card");
cards.forEach(function(c){
var idx=parseInt(c.getAttribute("data-idx"));
var r=RECIPES[idx];
var match=r.name.toLowerCase().indexOf(q)>-1||r.cat.toLowerCase().indexOf(q)>-1;
c.style.display=match?"":"none"})}

function viewRecipeAdmin(ri){
var r=RECIPES[ri];if(!r)return;
var mClr=r.meal==="Breakfast"?"#f59e0b":r.meal==="Lunch"?"#00f7ff":r.meal==="Dinner"?"#c792ff":"#6ee7b7";
var h2="<div class='mti'>"+H(r.name)+" "+XB()+"</div>";
h2+="<div style='display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px'>";
h2+="<span style='padding:4px 12px;border-radius:8px;font-size:11px;font-weight:700;background:"+mClr+"20;color:"+mClr+";border:1px solid "+mClr+"30'>"+H(r.meal||"Meal")+"</span>";
if(r.time)h2+="<span style='font-size:11px;color:#c8f0ff40'>"+H(r.time)+"</span>";
if(r.cost)h2+="<span style='font-size:11px;color:#c8f0ff40'>"+H(r.cost)+"</span>";
if(r.cal)h2+="<span style='font-size:11px;color:#c8f0ff40'>"+H(r.cal)+" cal</span>";
h2+="</div>";
var ingList=r.ing||"";
if(typeof ingList==="string")ingList=ingList.split(",").map(function(s){return s.trim()}).filter(function(s){return s});
if(ingList.length){
h2+="<div style='background:#060a1440;border:1px solid #6ee7b715;border-radius:10px;padding:14px;margin-bottom:10px'>";
h2+="<div style='font-family:Orbitron;font-size:10px;color:#6ee7b7;margin-bottom:8px;letter-spacing:1px'>INGREDIENTS ("+ingList.length+")</div>";
ingList.forEach(function(ing){h2+="<div style='display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #00f7ff04;font-size:12px'><span style='color:#6ee7b7;font-size:8px'>&#9679;</span> "+H(ing)+"</div>"});
h2+="</div>"}
var stepList=r.steps||"";
if(typeof stepList==="string")stepList=stepList.split(".").map(function(s){return s.trim()}).filter(function(s){return s});
if(stepList.length){
h2+="<div style='background:#060a1440;border:1px solid #f59e0b15;border-radius:10px;padding:14px;margin-bottom:10px'>";
h2+="<div style='font-family:Orbitron;font-size:10px;color:#f59e0b;margin-bottom:8px;letter-spacing:1px'>DIRECTIONS</div>";
stepList.forEach(function(step,si){h2+="<div style='display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #00f7ff04'><div style='font-family:Orbitron;font-size:14px;font-weight:800;color:#f59e0b;min-width:24px'>"+(si+1)+"</div><div style='font-size:12px;color:#c8f0ff;line-height:1.5'>"+H(step)+"</div></div>"});
h2+="</div>"}
h2+="<div style='display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:6px;margin-bottom:10px'>";
if(r.time)h2+="<div style='text-align:center;padding:10px;background:#060a1440;border-radius:8px;border:1px solid #00f7ff08'><div style='font-size:16px'>&#9201;</div><div style='font-family:Orbitron;font-size:12px;color:#00f7ff'>"+H(r.time)+"</div><div style='font-size:7px;color:#c8f0ff20'>PREP TIME</div></div>";
if(r.cost)h2+="<div style='text-align:center;padding:10px;background:#060a1440;border-radius:8px;border:1px solid #00f7ff08'><div style='font-size:16px'>&#128176;</div><div style='font-family:Orbitron;font-size:12px;color:#6ee7b7'>"+H(r.cost)+"</div><div style='font-size:7px;color:#c8f0ff20'>COST</div></div>";
if(r.cal)h2+="<div style='text-align:center;padding:10px;background:#060a1440;border-radius:8px;border:1px solid #00f7ff08'><div style='font-size:16px'>&#128293;</div><div style='font-family:Orbitron;font-size:12px;color:#ff4757'>"+H(r.cal)+"</div><div style='font-size:7px;color:#c8f0ff20'>CALORIES</div></div>";
h2+="<div style='text-align:center;padding:10px;background:#060a1440;border-radius:8px;border:1px solid #00f7ff08'><div style='font-size:16px'>&#127858;</div><div style='font-family:Orbitron;font-size:12px;color:#c8f0ff'>"+ingList.length+"</div><div style='font-size:7px;color:#c8f0ff20'>ITEMS</div></div>";
h2+="</div>";
h2+="<button class='b' style='width:100%;margin-top:6px;padding:10px' onclick='CM();reloadNutr()'>BACK TO RECIPES</button>";
SM(h2)}

function openAddRecipe(){
var h2="<div class='mti'>+ ADD RECIPE "+XB()+"</div>";
h2+="<label class='lb'>NAME</label><input class='ip' id='nrName'>";
h2+="<div class='r2'><div><label class='lb'>MEAL TYPE</label><select class='ip' id='nrMeal'><option>Breakfast</option><option>Lunch</option><option>Dinner</option><option>Snack</option></select></div><div><label class='lb'>PREP TIME</label><input class='ip' id='nrTime' placeholder='15m'></div></div>";
h2+="<div class='r2'><div><label class='lb'>COST</label><input class='ip' id='nrCost' placeholder='$5'></div><div><label class='lb'>CALORIES</label><input class='ip' id='nrCal' placeholder='350'></div></div>";
h2+="<label class='lb'>INGREDIENTS (one per line)</label><textarea class='ip' id='nrIng' style='min-height:80px'></textarea>";
h2+="<label class='lb'>DIRECTIONS (one per line)</label><textarea class='ip' id='nrSteps' style='min-height:80px'></textarea>";
h2+="<button class='b bg2' style='width:100%;margin-top:8px;padding:10px' onclick='saveNewRecipe()'>+ ADD RECIPE</button>";
SM(h2)}

function saveNewRecipe(){
var name=document.getElementById("nrName").value.trim();if(!name)return;
var ingText=document.getElementById("nrIng").value;
var stepsText=document.getElementById("nrSteps").value;
RECIPES.push({
name:name,
meal:document.getElementById("nrMeal").value,
time:document.getElementById("nrTime").value.trim()||"",
cost:document.getElementById("nrCost").value.trim()||"",
cal:document.getElementById("nrCal").value.trim()||"",
ing:ingText,
steps:stepsText
});
localStorage.setItem("hc6-recipes",JSON.stringify(RECIPES));
CM();reloadNutr()}


function setMealFilter(idx){var t=['All','Breakfast','Lunch','Dinner','Snack'];nutrFilter=t[idx]||'All';reloadNutr()}
function reloadNutr(){var pg=document.getElementById('pg');if(pg)rNutrition(pg)}
var nutrFilter="All";
function rNutrition(el){
var h="";

/* Meal type filter tabs */
h+="<div class='cd'><div class='ct'>▸ RECIPE LIBRARY</div>";
h+="<div style='display:flex;gap:4px;margin-bottom:8px;overflow-x:auto;-webkit-overflow-scrolling:touch'>";
var mealTypes=["All","Breakfast","Lunch","Dinner","Snack"];
mealTypes.forEach(function(m,mi){h+="<button class='fi"+(nutrFilter===m?" on":"")+"' onclick='setMealFilter("+mi+")'>"+m+"</button>"});
h+="</div>";

h+="<div style='display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap'>";
h+="<input class='si' id='adminRecSrch' placeholder='Search recipes...' oninput='reloadNutr()' style='flex:1;min-width:150px'>";
h+="<button class='b bg2' onclick='openAddRecipe()'>+ ADD RECIPE</button></div>";

var rq=(document.getElementById("adminRecSrch")?document.getElementById("adminRecSrch").value:"").toLowerCase();

var filtered=[];
RECIPES.forEach(function(r,ri){
if(nutrFilter!=="All"&&r.meal!==nutrFilter)return;
if(rq&&r.name.toLowerCase().indexOf(rq)===-1&&(r.meal||"").toLowerCase().indexOf(rq)===-1&&(r.ing||"").toLowerCase().indexOf(rq)===-1)return;
filtered.push({r:r,ri:ri})});

h+="<div style='font-size:10px;color:#c8f0ff30;margin-bottom:6px'>"+filtered.length+" recipe"+(filtered.length!==1?"s":"")+"</div>";

filtered.forEach(function(item){
var r=item.r;
var mClr=r.meal==="Breakfast"?"#f59e0b":r.meal==="Lunch"?"#00f7ff":r.meal==="Dinner"?"#c792ff":"#6ee7b7";
h+="<div class='recipe-card' onclick='viewRecipeAdmin("+item.ri+")'>";
h+="<div style='display:flex;justify-content:space-between;align-items:center'>";
h+="<div><div class='recipe-name'>"+H(r.name)+"</div>";
h+="<div class='recipe-meta'>";
h+="<span style='color:"+mClr+"'>"+H(r.meal||"")+"</span>";
if(r.time)h+="<span>"+H(r.time)+"</span>";
if(r.cost)h+="<span>"+H(r.cost)+"</span>";if(r.cal)h+="<span style='color:#ff4757'>"+r.cal+" cal</span>";
h+="</div></div></div></div>"});

if(!filtered.length)h+="<div class='emp'>NO MATCHING RECIPES</div>";
h+="</div>";

/* Participant Meal Logs */
h+="<div class='cd'><div class='ct'>▸ PARTICIPANT MEAL LOGS</div>";
h+="<div style='margin-bottom:8px'><input class='si' id='nutrLogSrch' placeholder='Search participant...' oninput='reloadNutr()' style='width:100%'></div>";

var nq=(document.getElementById("nutrLogSrch")?document.getElementById("nutrLogSrch").value:"").toLowerCase();
var hasLogs=false;
P.filter(function(p){return p.s==="active"&&p.nutrLog&&p.nutrLog.length}).forEach(function(p){
if(nq&&p.n.toLowerCase().indexOf(nq)===-1)return;
hasLogs=true;
h+="<div style='margin-bottom:8px;padding:10px;background:#060a1420;border:1px solid #00f7ff06;border-radius:8px'>";
h+="<div style='font-size:13px;font-weight:700;color:#00f7ff;margin-bottom:6px'>"+H(p.n)+"</div>";
(p.nutrLog||[]).slice(-7).reverse().forEach(function(n){
var mClr2=n.meal==="Breakfast"?"#f59e0b":n.meal==="Lunch"?"#00f7ff":n.meal==="Dinner"?"#c792ff":"#6ee7b7";
h+="<div style='display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #00f7ff04;font-size:11px'>";
h+="<div><span style='color:"+mClr2+";font-size:9px;font-weight:700'>"+H(n.meal)+"</span> "+H(n.text)+"</div>";
h+="<span style='color:#c8f0ff20;font-size:9px'>"+H(n.date)+"</span></div>"});
h+="</div>"});
if(!hasLogs)h+="<div class='emp'>NO MEAL LOGS FROM PARTICIPANTS YET</div>";
h+="</div>";

el.innerHTML=h}

function assignRecipe(){
var pid=document.getElementById("recAssignPid").value;
var ri=parseInt(document.getElementById("recAssignRec").value);
if(!pid||isNaN(ri))return;
var p=P.find(function(x){return x.id===pid});if(!p)return;
var r=RECIPES[ri];if(!r)return;
if(!p.assignedRecipes)p.assignedRecipes=[];
if(!p.assignedRecipes.some(function(ar){return ar.name===r.name})){
p.assignedRecipes.push({name:r.name,date:new Date().toISOString().split("T")[0]})}
SV();
rNutrition(document.getElementById("pg"))}

</script><div id='printArea' style='display:none'></div>
